name: Generate daily digest

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Install Pi agent CLI
        run: npm install -g --ignore-scripts @earendil-works/pi-coding-agent@0.78.1

      - name: Generate daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          PI_MODEL: ${{ vars.PI_MODEL || 'claude-sonnet-4-5' }}
          PI_PROVIDER: ${{ vars.PI_PROVIDER || 'anthropic' }}
          PI_SKIP_VERSION_CHECK: "1"
          PI_TELEMETRY: "0"
        run: |
          if [ -n "$ANTHROPIC_BASE_URL" ]; then
            node -e 'const fs = require("fs"); const dir = `${process.env.HOME}/.pi/agent`; fs.mkdirSync(dir, { recursive: true }); fs.writeFileSync(`${dir}/models.json`, `${JSON.stringify({ providers: { anthropic: { baseUrl: process.env.ANTHROPIC_BASE_URL } } })}\n`);'
          fi
          pi --provider "$PI_PROVIDER" --model "$PI_MODEL" --thinking high --no-session \
            --prompt-template .pi/prompts/daily.md \
            --skill .pi/skills/chinese-writing \
            -p "/daily"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily/ history.json
          if git diff --quiet --cached -- daily history.json; then
            echo "No daily digest changes to commit"
            exit 0
          fi
          git commit -m "chore: add daily digest and update history"
          git push
